name: AOC Autonomous Delivery
run-name: AOC autonomy — ${{ github.event_name }} — ${{ github.run_number }}

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: Motif du passage manuel
        required: false
        default: manual
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  issue_comment:
    types: [created]
  issues:
    types: [labeled]
  schedule:
    - cron: "3,13,23,33,43,53 * * * *"

permissions:
  actions: write
  checks: read
  contents: write
  issues: write
  models: read
  pull-requests: write
  statuses: read

concurrency:
  group: aoc-autonomous-delivery-v2
  cancel-in-progress: ${{ github.event_name == 'push' }}

env:
  NPM_CONFIG_IGNORE_SCRIPTS: "true"
  AOC_GITHUB_ONLY: "true"

jobs:
  orchestrate:
    if: >-
      vars.AOC_AUTONOMY_ENABLED != 'false' &&
      (github.event_name != 'issues' || github.event.label.name == 'agent:ready')
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - name: Checkout trusted governance from main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install trusted dependencies without lifecycle scripts
        run: npm ci --ignore-scripts

      - name: Route trusted autonomy commands
        id: command
        if: github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '/agent ')
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/agents/command-router.mjs

      - name: Reconcile the autonomous issue registry
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/agents/reconcile-issues.mjs

      - name: Read autonomous pause state
        id: control
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PAUSED=$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --label 'agent:paused' \
            --limit 100 \
            --json body,number \
            --jq '[.[] | select((.body // "") | contains("<!-- AOC-AUTONOMY-CONTROL -->"))] | length > 0')
          echo "paused=$PAUSED" >> "$GITHUB_OUTPUT"

      - name: Recover bounded transient model failures
        if: steps.control.outputs.paused != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/agents/recover-transient-model-failures.mjs

      - name: Synchronize active lot branch with main
        if: steps.control.outputs.paused != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/agents/sync-active-lot-branch.mjs

      - name: Capture active lot head before orchestration
        id: before
        if: steps.control.outputs.paused != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          HEAD=$(gh pr list --repo "$GITHUB_REPOSITORY" --state open --limit 20 --json headRefName,headRefOid --jq '[.[] | select(.headRefName | startswith("agent/"))][0].headRefOid // ""')
          echo "head=$HEAD" >> "$GITHUB_OUTPUT"

      - name: Publish orchestration start checkpoint
        if: steps.control.outputs.paused != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/agents/run-progress.mjs start

      - name: Run GitHub-only multi-agent orchestrator
        if: steps.control.outputs.paused != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_MODELS_TOKEN: ${{ github.token }}
          NODE_OPTIONS: "--import=./scripts/agents/github-models-budget.mjs --import=./scripts/agents/github-models-resilience.mjs"
          AOC_AUTONOMY_ENABLED: ${{ vars.AOC_AUTONOMY_ENABLED || 'true' }}
          AOC_MAX_AGENT_TURNS: ${{ vars.AOC_MAX_AGENT_TURNS }}
          AOC_AGENT_MAX_TOKENS: ${{ vars.AOC_AGENT_MAX_TOKENS }}
          AOC_MODEL_REASONING: ${{ vars.AOC_MODEL_REASONING }}
          AOC_MODEL_CODE: ${{ vars.AOC_MODEL_CODE }}
          AOC_MODEL_FAST: ${{ vars.AOC_MODEL_FAST }}
          AOC_MODEL_DESIGN: ${{ vars.AOC_MODEL_DESIGN }}
          GITHUB_EVENT_NAME: ${{ steps.command.outputs.routed == 'true' && 'workflow_dispatch' || github.event_name }}
        run: node scripts/agents/orchestrator.mjs

      - name: Verify real agent production
        id: watchdog
        if: steps.control.outputs.paused != 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          AOC_HEAD_BEFORE: ${{ steps.before.outputs.head }}
        run: node scripts/agents/assert-agent-production.mjs

      - name: Publish truthful orchestration finish checkpoint
        if: always() && steps.control.outputs.paused != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/agents/run-progress.mjs finish "${{ steps.watchdog.outputs.result || 'failed' }}"

      - name: Enforce production watchdog
        if: steps.watchdog.outcome == 'failure'
        run: exit 1

      - name: Upload immutable agent audit trail
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aoc-agent-audit-${{ github.run_id }}
          path: .agent/
          if-no-files-found: warn
          retention-days: 30
