name: AOC Autonomous Delivery
run-name: AOC autonomy — ${{ github.event_name }} — ${{ github.run_number }}

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: Motif du passage manuel
        required: false
        default: manual
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  issue_comment:
    types: [created]
  issues:
    types: [labeled]
  schedule:
    - cron: "3,13,23,33,43,53 * * * *"

permissions:
  actions: write
  checks: read
  contents: write
  issues: write
  models: read
  pull-requests: write
  statuses: read

concurrency:
  # A push on main contains a newer trusted runtime and must cancel an obsolete
  # queued/running generation. Routine schedule/comment/label events stay
  # serialized without interrupting a long agent task already in progress.
  group: aoc-autonomous-delivery-v2
  cancel-in-progress: ${{ github.event_name == 'push' }}

env:
  NPM_CONFIG_IGNORE_SCRIPTS: "true"
  AOC_GITHUB_ONLY: "true"

jobs:
  orchestrate:
    if: >-
      vars.AOC_AUTONOMY_ENABLED != 'false' &&
      (github.event_name != 'issues' || github.event.label.name == 'agent:ready')
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - name: Checkout trusted governance from main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install trusted dependencies without lifecycle scripts
        run: npm ci --ignore-scripts

      - name: Reconcile the autonomous issue registry
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/agents/reconcile-issues.mjs

      - name: Read autonomous pause state
        id: control
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PAUSED=$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --label 'agent:paused' \
            --limit 100 \
            --json body,number \
            --jq '[.[] | select((.body // "") | contains("<!-- AOC-AUTONOMY-CONTROL -->"))] | length > 0')
          echo "paused=$PAUSED" >> "$GITHUB_OUTPUT"
          if [ "$PAUSED" = "true" ]; then
            echo "AOC autonomy is paused: registry reconciliation completed, product-agent execution skipped."
          fi

      - name: Run GitHub-only multi-agent orchestrator
        if: >-
          steps.control.outputs.paused != 'true' ||
          (github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '/agent '))
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_MODELS_TOKEN: ${{ github.token }}
          NODE_OPTIONS: "--import=./scripts/agents/github-models-budget.mjs"
          AOC_AUTONOMY_ENABLED: ${{ vars.AOC_AUTONOMY_ENABLED || 'true' }}
          AOC_MAX_AGENT_TURNS: ${{ vars.AOC_MAX_AGENT_TURNS }}
          AOC_AGENT_MAX_TOKENS: ${{ vars.AOC_AGENT_MAX_TOKENS }}
          AOC_MODEL_REASONING: ${{ vars.AOC_MODEL_REASONING }}
          AOC_MODEL_CODE: ${{ vars.AOC_MODEL_CODE }}
          AOC_MODEL_FAST: ${{ vars.AOC_MODEL_FAST }}
          AOC_MODEL_DESIGN: ${{ vars.AOC_MODEL_DESIGN }}
        run: node scripts/agents/orchestrator.mjs

      - name: Upload immutable agent audit trail
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aoc-agent-audit-${{ github.run_id }}
          path: .agent/
          if-no-files-found: ignore
          retention-days: 30
