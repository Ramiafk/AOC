name: AOS Autonomous Developer

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      mode:
        description: initial or fix
        required: true
        default: initial
        type: choice
        options: [initial, fix]
      issue_number:
        description: Issue containing the lot specification
        required: false
        type: string
      pr_number:
        description: Existing PR to correct
        required: false
        type: string
      expected_head_sha:
        description: Head SHA reviewed by the CTO before this correction
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write
  statuses: write
  models: read

concurrency:
  group: aos-autonomous-developer
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/aos_test

jobs:
  develop:
    if: >-
      vars.AOS_AUTONOMY_PAUSED != 'true' &&
      (github.event_name == 'workflow_dispatch' || startsWith(github.event.issue.title, '[AUTONOMOUS LOT]'))
    runs-on: ubuntu-latest
    timeout-minutes: 90
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aos_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d aos_test"
          --health-interval 2s --health-timeout 3s --health-retries 30
    steps:
      - name: Resolve trusted task context
        id: context
        uses: actions/github-script@v7
        env:
          DISPATCH_MODE: ${{ inputs.mode || '' }}
          DISPATCH_ISSUE: ${{ inputs.issue_number || '' }}
          DISPATCH_PR: ${{ inputs.pr_number || '' }}
          EXPECTED_HEAD_SHA: ${{ inputs.expected_head_sha || '' }}
        with:
          github-token: ${{ github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const isIssueEvent = context.eventName === 'issues';
            const mode = isIssueEvent ? 'initial' : (process.env.DISPATCH_MODE || 'initial');
            if (!['initial', 'fix'].includes(mode)) core.setFailed(`Unsupported mode: ${mode}`);

            if (isIssueEvent) {
              const login = context.payload.issue.user.login;
              const trusted = login === owner || login === 'github-actions[bot]';
              if (!trusted) core.setFailed(`Untrusted issue author: ${login}`);
            }

            if (mode === 'initial') {
              const issueNumber = Number(isIssueEvent ? context.payload.issue.number : process.env.DISPATCH_ISSUE);
              if (!issueNumber) return core.setFailed('issue_number is required for initial mode');
              const { data: issue } = await github.rest.issues.get({ owner, repo, issue_number: issueNumber });
              if (!issue.title.startsWith('[AUTONOMOUS LOT]')) return core.setFailed('Issue is not an autonomous lot');

              const { data: openPulls } = await github.rest.pulls.list({ owner, repo, state: 'open', per_page: 100 });
              const active = openPulls.filter((pr) => pr.head.ref.startsWith('agent/lot-'));
              if (active.length) return core.setFailed(`Another lot PR is active: #${active[0].number}`);

              const branchMatch = issue.body?.match(/^Branch:\s*`?([^`\s]+)`?/mi);
              const lotMatch = issue.title.match(/Lot\s+([0-9A-Za-z.-]+)/i);
              const lotId = (lotMatch?.[1] || String(issueNumber)).toLowerCase();
              const slug = issue.title
                .replace(/^\[AUTONOMOUS LOT\]\s*/i, '')
                .replace(/^Lot\s+[0-9A-Za-z.-]+\s*[—:-]?\s*/i, '')
                .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
                .toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '').slice(0, 50);
              const branch = branchMatch?.[1] || `agent/lot-${lotId}-${slug}`;
              core.setOutput('mode', mode);
              core.setOutput('issue_number', String(issueNumber));
              core.setOutput('pr_number', '');
              core.setOutput('branch', branch);
              core.setOutput('checkout_ref', 'main');
              core.setOutput('title', issue.title.replace(/^\[AUTONOMOUS LOT\]\s*/i, ''));
              return;
            }

            const prNumber = Number(process.env.DISPATCH_PR);
            if (!prNumber) return core.setFailed('pr_number is required for fix mode');
            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: prNumber });
            if (pr.state !== 'open') return core.setFailed(`PR #${prNumber} is not open`);
            if (!pr.head.ref.startsWith('agent/lot-')) return core.setFailed('Only autonomous lot branches can be corrected');
            if (process.env.EXPECTED_HEAD_SHA && pr.head.sha !== process.env.EXPECTED_HEAD_SHA) return core.setFailed(`Head moved: expected ${process.env.EXPECTED_HEAD_SHA}, got ${pr.head.sha}`);
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number: prNumber, per_page: 100 });
            const rounds = comments.filter((comment) => comment.body?.includes('AOS_AUTONOMY_CTO') && comment.body?.includes('CHANGES_REQUIRED')).length;
            if (rounds >= 4) return core.setFailed(`Safety stop: ${rounds} CTO correction rounds already attempted`);
            core.setOutput('mode', mode);
            core.setOutput('issue_number', '');
            core.setOutput('pr_number', String(prNumber));
            core.setOutput('branch', pr.head.ref);
            core.setOutput('checkout_ref', pr.head.ref);
            core.setOutput('title', pr.title);

      - uses: actions/checkout@v5
        with:
          ref: ${{ steps.context.outputs.checkout_ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Create initial lot branch
        if: steps.context.outputs.mode == 'initial'
        env:
          BRANCH: ${{ steps.context.outputs.branch }}
        run: git switch -c "$BRANCH"

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Compose developer prompt
        env:
          GH_TOKEN: ${{ github.token }}
          MODE: ${{ steps.context.outputs.mode }}
          ISSUE_NUMBER: ${{ steps.context.outputs.issue_number }}
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}
          BRANCH: ${{ steps.context.outputs.branch }}
        run: |
          mkdir -p .agent-runtime
          cp config/agents/developer-prompt.md .agent-runtime/developer-task.md
          {
            echo
            echo "# Contexte dynamique"
            echo
            echo "Mode : $MODE"
            echo "Branche : $BRANCH"
            if [ "$MODE" = "initial" ]; then
              gh api "repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}" --jq '"## Titre du lot\n\n" + .title + "\n\n## Spécification\n\n" + (.body // "")'
            else
              echo "## Pull Request à corriger"
              gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" --jq '"\nTitre : " + .title + "\nBase : " + .base.ref + "\nHead : " + .head.sha + "\n\nDescription :\n" + (.body // "")'
              echo
              echo "## Dernière décision CTO"
              gh api --paginate "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" --jq '[.[] | select(.body | contains("AOS_AUTONOMY_CTO"))] | last | .body'
            fi
            echo
            echo "# Instruction finale"
            echo "Implémente ou corrige uniquement ce lot. Inspecte le code existant avant d’écrire. Exécute les validations et appelle finish seulement lorsque le lot est prêt pour une nouvelle revue CTO."
          } >> .agent-runtime/developer-task.md

      - name: Select agent provider
        id: provider
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "$OPENAI_API_KEY" ]; then echo "codex=true" >> "$GITHUB_OUTPUT"; else echo "codex=false" >> "$GITHUB_OUTPUT"; fi

      - name: Develop with Codex
        if: steps.provider.outputs.codex == 'true'
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .agent-runtime/developer-task.md
          output-file: .agent-runtime/developer-result.json
          permission-profile: ":workspace"
          model: ${{ vars.AOS_CODEX_MODEL }}
          effort: high

      - name: Develop with GitHub Models fallback
        if: steps.provider.outputs.codex != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          AOS_AGENT_MODEL: ${{ vars.AOS_GITHUB_MODEL || 'openai/gpt-4.1' }}
        run: node scripts/agents/github-models-agent.mjs --role=developer --prompt-file=.agent-runtime/developer-task.md --output=.agent-runtime/developer-result.json

      - name: Run complete validation
        run: |
          npm run typecheck
          npm test
          npm run check

      - name: Enforce protected paths
        env:
          BRANCH: ${{ steps.context.outputs.branch }}
        run: |
          { git diff --name-only HEAD; git ls-files --others --exclude-standard; } | sort -u > .agent-runtime/changed-files.txt
          node scripts/agents/check-protected-paths.mjs --files=.agent-runtime/changed-files.txt --branch="$BRANCH"
          if [ ! -s .agent-runtime/changed-files.txt ]; then echo "The agent produced no repository change" >&2; exit 1; fi

      - name: Commit and push
        id: push
        env:
          BRANCH: ${{ steps.context.outputs.branch }}
          TITLE: ${{ steps.context.outputs.title }}
        run: |
          rm -rf .agent-runtime
          git config user.name "aos-development-agent[bot]"
          git config user.email "aos-development-agent[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: ${TITLE}"
          git push --set-upstream origin "HEAD:${BRANCH}"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create or resolve draft PR
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          MODE: ${{ steps.context.outputs.mode }}
          EXISTING_PR: ${{ steps.context.outputs.pr_number }}
          ISSUE_NUMBER: ${{ steps.context.outputs.issue_number }}
          BRANCH: ${{ steps.context.outputs.branch }}
          TITLE: ${{ steps.context.outputs.title }}
          SHA: ${{ steps.push.outputs.sha }}
        run: |
          if [ "$MODE" = "initial" ]; then
            cat > /tmp/pr-body.md <<BODY
          ### Objectif
          Livraison autonome du lot décrit dans l’issue #${ISSUE_NUMBER}.

          ### Gouvernance
          - branche dédiée : \`${BRANCH}\`
          - commit final : \`${SHA}\`
          - validations : typecheck, tests PostgreSQL 17 et architecture
          - PR maintenue en brouillon jusqu’à la décision CTO autonome
          - aucun lot suivant ne démarre avant fusion

          Closes #${ISSUE_NUMBER}
          BODY
            PR_URL=$(gh pr create --draft --base main --head "$BRANCH" --title "$TITLE" --body-file /tmp/pr-body.md)
            PR_NUMBER=$(gh pr view "$PR_URL" --json number --jq .number)
          else
            PR_NUMBER="$EXISTING_PR"
          fi
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Publish green CI status and development report
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          SHA: ${{ steps.push.outputs.sha }}
        run: |
          gh api -X POST "repos/${GITHUB_REPOSITORY}/statuses/${SHA}" -f state=success -f context='autonomy/ci' -f description='Typecheck, PostgreSQL tests and architecture passed'
          gh pr comment "$PR_NUMBER" --body "<!-- AOS_AUTONOMY_DEV sha=${SHA} -->
          ## Agent développeur : lot prêt pour revue CTO

          - commit : \`${SHA}\`
          - typecheck : réussi
          - tests PostgreSQL 17 : réussis
          - architecture : réussie
          - PR maintenue en brouillon

          Le workflow CTO indépendant est déclenché sur ce SHA."

      - name: Dispatch independent CTO review
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          SHA: ${{ steps.push.outputs.sha }}
        run: gh workflow run autonomous-cto.yml --ref main -f pr_number="$PR_NUMBER" -f expected_head_sha="$SHA"

      - name: Report autonomous developer failure
        if: failure() && steps.context.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}
        run: |
          gh pr comment "$PR_NUMBER" --body "<!-- AOS_AUTONOMY_BLOCKED -->
          Le workflow développeur autonome a échoué avant de produire un nouveau SHA vert. Le watchdog tentera une reprise contrôlée."
