name: AOS Autonomous Next Lot

on:
  workflow_dispatch:
    inputs:
      previous_pr:
        description: Previously merged PR
        required: false
        type: string

permissions:
  contents: read
  pull-requests: read
  issues: write
  actions: write

concurrency:
  group: aos-autonomous-next-lot
  cancel-in-progress: false

jobs:
  select:
    if: vars.AOS_AUTONOMY_PAUSED != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          persist-credentials: false

      - name: Select first unfinished lot and dispatch developer
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const backlog = JSON.parse(fs.readFileSync('config/agents/backlog.json', 'utf8'));
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const { data: pulls } = await github.rest.pulls.list({ owner, repo, state: 'all', per_page: 100 });
            const { data: issues } = await github.rest.issues.listForRepo({ owner, repo, state: 'open', per_page: 100 });
            const activeLotPr = pulls.find((pr) => pr.state === 'open' && pr.head.ref.startsWith('agent/lot-'));
            if (activeLotPr) {
              core.info(`Active lot PR already exists: #${activeLotPr.number}`);
              return;
            }

            let selected = null;
            for (const lot of backlog.lots) {
              const merged = pulls.some((pr) => pr.merged_at && pr.title.toLowerCase().includes(`lot ${lot.id.toLowerCase()}`));
              if (!merged) { selected = lot; break; }
            }
            if (!selected) {
              await github.rest.issues.create({
                owner, repo,
                title: '[AUTONOMY] Backlog 5J–5N terminé',
                body: 'Tous les lots configurés dans `config/agents/backlog.json` ont une PR fusionnée. Le cycle autonome est arrêté proprement en attente d’une nouvelle roadmap.'
              });
              return;
            }

            const title = `[AUTONOMOUS LOT] Lot ${selected.id} — ${selected.title}`;
            let issue = issues.find((item) => item.title === title);
            if (!issue) {
              const lines = [
                `Branch: \`${selected.branch}\``,
                '',
                '## Objectif',
                selected.objective,
                '',
                '## Périmètre',
                ...selected.scope.map((value) => `- ${value}`),
                '',
                '## Hors périmètre',
                ...selected.outOfScope.map((value) => `- ${value}`),
                '',
                '## Critères d’acceptation',
                ...selected.acceptance.map((value) => `- ${value}`),
                '',
                '## Gouvernance',
                '- respecter intégralement `AGENTS.md` ;',
                '- une seule PR brouillon ;',
                '- aucun lot suivant avant approbation et fusion ;',
                '- migrations historiques, sécurité multi-tenant et tests PostgreSQL obligatoires.'
              ];
              const created = await github.rest.issues.create({ owner, repo, title, body: lines.join('\n') });
              issue = created.data;
            }

            await github.rest.actions.createWorkflowDispatch({
              owner, repo,
              workflow_id: 'autonomous-developer.yml',
              ref: 'main',
              inputs: { mode: 'initial', issue_number: String(issue.number), pr_number: '', expected_head_sha: '' }
            });
            core.info(`Dispatched lot ${selected.id} from issue #${issue.number}`);
