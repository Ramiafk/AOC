name: AOC Autonomy Diagnostic V3

on:
  push:
    branches: [chore/autonomy-run-diagnostics-v3]

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Publish concise autonomy snapshot
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/issues/16/comments?per_page=100" \
            --jq '.[-5:] | map({id,user:.user.login,created_at,updated_at,body})' > /tmp/aoc-issue16-comments.json
          gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/autonomous-delivery.yml/runs?per_page=10" \
            --jq '.workflow_runs | map({id,event,status,conclusion,head_branch,head_sha,run_number,created_at,updated_at,html_url})' > /tmp/aoc-runs.json
          {
            echo '<!-- AOC-AUTONOMY-DIAGNOSTIC-V3 -->'
            echo '## Diagnostic autonome concis'
            echo
            echo '### Derniers commentaires du lot 5J'
            echo '```json'
            cat /tmp/aoc-issue16-comments.json
            echo '```'
            echo
            echo '### Dix derniers passages de l’orchestrateur'
            echo '```json'
            cat /tmp/aoc-runs.json
            echo '```'
          } > /tmp/aoc-diagnostic.md
          gh issue comment 93 --repo "$GITHUB_REPOSITORY" --body-file /tmp/aoc-diagnostic.md
