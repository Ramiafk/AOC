name: AOS Autonomous Watchdog

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  issues: write
  actions: write
  statuses: read

concurrency:
  group: aos-autonomous-watchdog
  cancel-in-progress: true

jobs:
  recover:
    if: vars.AOS_AUTONOMY_PAUSED != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Recover stalled autonomous loop
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runs = await github.rest.actions.listWorkflowRunsForRepo({ owner, repo, status: 'in_progress', per_page: 100 });
            const autonomousRunning = runs.data.workflow_runs.some((run) => ['AOS Autonomous Developer', 'AOS Autonomous CTO', 'AOS Autonomous Next Lot'].includes(run.name));
            if (autonomousRunning) return core.info('An autonomous workflow is already running');

            const { data: pulls } = await github.rest.pulls.list({ owner, repo, state: 'open', per_page: 100 });
            const pr = pulls.find((value) => value.head.ref.startsWith('agent/lot-'));
            if (!pr) {
              const developerRuns = await github.rest.actions.listWorkflowRuns({
                owner, repo, workflow_id: 'autonomous-developer.yml', status: 'completed', per_page: 10
              });
              let consecutiveFailures = 0;
              for (const run of developerRuns.data.workflow_runs) {
                if (run.conclusion === 'success') break;
                if (['failure', 'timed_out', 'cancelled', 'action_required', 'startup_failure'].includes(run.conclusion)) consecutiveFailures += 1;
              }
              if (consecutiveFailures >= 3) {
                const title = '[AUTONOMY BLOCKED] Trois échecs développeur consécutifs sans PR';
                const openIssues = await github.rest.issues.listForRepo({ owner, repo, state: 'open', per_page: 100 });
                if (!openIssues.data.some((issue) => issue.title === title)) {
                  await github.rest.issues.create({
                    owner, repo, title,
                    body: `La boucle a été arrêtée automatiquement après ${consecutiveFailures} exécutions développeur consécutives sans PR exploitable. Les logs GitHub Actions constituent la source de diagnostic. Aucun nouveau lot ne sera relancé tant qu’un run développeur n’aura pas réussi ou que la gouvernance n’aura pas été corrigée.`
                  });
                }
                return core.warning(`Safety stop after ${consecutiveFailures} consecutive developer failures`);
              }
              await github.rest.actions.createWorkflowDispatch({
                owner, repo, workflow_id: 'autonomous-next-lot.yml', ref: 'main',
                inputs: { previous_pr: '' }
              });
              return core.info('No active lot PR; next-lot workflow dispatched');
            }

            const statuses = await github.rest.repos.listCommitStatusesForRef({ owner, repo, ref: pr.head.sha, per_page: 100 });
            const latestByContext = new Map();
            for (const status of statuses.data) if (!latestByContext.has(status.context)) latestByContext.set(status.context, status);
            const ci = latestByContext.get('autonomy/ci');
            const cto = latestByContext.get('autonomy/cto');
            if (ci?.state === 'success' && !cto) {
              await github.rest.actions.createWorkflowDispatch({
                owner, repo, workflow_id: 'autonomous-cto.yml', ref: 'main',
                inputs: { pr_number: String(pr.number), expected_head_sha: pr.head.sha }
              });
              return core.info(`CTO review recovered for PR #${pr.number}`);
            }
            if (cto?.state === 'failure') {
              await github.rest.actions.createWorkflowDispatch({
                owner, repo, workflow_id: 'autonomous-developer.yml', ref: 'main',
                inputs: { mode: 'fix', issue_number: '', pr_number: String(pr.number), expected_head_sha: pr.head.sha }
              });
              return core.info(`Developer correction recovered for PR #${pr.number}`);
            }
            if (cto?.state === 'success') {
              await github.rest.actions.createWorkflowDispatch({
                owner, repo, workflow_id: 'autonomous-cto.yml', ref: 'main',
                inputs: { pr_number: String(pr.number), expected_head_sha: pr.head.sha }
              });
              return core.info(`Approved-but-open PR #${pr.number}; merge revalidation dispatched`);
            }
            if (!ci || ci.state !== 'success') {
              const comments = await github.rest.issues.listComments({ owner, repo, issue_number: pr.number, per_page: 100 });
              const failures = comments.data.filter((comment) => comment.body?.includes('AOS_AUTONOMY_BLOCKED')).length;
              if (failures >= 3) return core.warning(`Safety stop for PR #${pr.number}: ${failures} failed developer runs`);
              await github.rest.actions.createWorkflowDispatch({
                owner, repo, workflow_id: 'autonomous-developer.yml', ref: 'main',
                inputs: { mode: 'fix', issue_number: '', pr_number: String(pr.number), expected_head_sha: pr.head.sha }
              });
              return core.info(`Missing green autonomous CI; developer recovery dispatched for PR #${pr.number}`);
            }
            core.info(`PR #${pr.number} has no actionable stalled state`);
