name: AOS Autonomous Watchdog

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  issues: read
  actions: write
  statuses: read

concurrency:
  group: aos-autonomous-watchdog
  cancel-in-progress: true

jobs:
  recover:
    if: vars.AOS_AUTONOMY_PAUSED != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Recover stalled autonomous loop
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const runs = await github.rest.actions.listWorkflowRunsForRepo({ owner, repo, status: 'in_progress', per_page: 100 });
            const autonomousRunning = runs.data.workflow_runs.some((run) => ['AOS Autonomous Developer', 'AOS Autonomous CTO', 'AOS Autonomous Next Lot'].includes(run.name));
            if (autonomousRunning) return core.info('An autonomous workflow is already running');

            const { data: pulls } = await github.rest.pulls.list({ owner, repo, state: 'open', per_page: 100 });
            const pr = pulls.find((value) => value.head.ref.startsWith('agent/lot-'));
            if (!pr) {
              await github.rest.actions.createWorkflowDispatch({ owner, repo, workflow_id: 'autonomous-next-lot.yml', ref: 'main', inputs: { previous_pr: '' } });
              return core.info('No active lot PR; next-lot workflow dispatched');
            }

            const statuses = await github.rest.repos.listCommitStatusesForRef({ owner, repo, ref: pr.head.sha, per_page: 100 });
            const latestByContext = new Map();
            for (const status of statuses.data) if (!latestByContext.has(status.context)) latestByContext.set(status.context, status);
            const ci = latestByContext.get('autonomy/ci');
            const cto = latestByContext.get('autonomy/cto');
            if (ci?.state === 'success' && !cto) {
              await github.rest.actions.createWorkflowDispatch({ owner, repo, workflow_id: 'autonomous-cto.yml', ref: 'main', inputs: { pr_number: String(pr.number), expected_head_sha: pr.head.sha } });
              return core.info(`CTO review recovered for PR #${pr.number}`);
            }
            if (cto?.state === 'failure') {
              await github.rest.actions.createWorkflowDispatch({ owner, repo, workflow_id: 'autonomous-developer.yml', ref: 'main', inputs: { mode: 'fix', issue_number: '', pr_number: String(pr.number), expected_head_sha: pr.head.sha } });
              return core.info(`Developer correction recovered for PR #${pr.number}`);
            }
            if (cto?.state === 'success') {
              await github.rest.actions.createWorkflowDispatch({ owner, repo, workflow_id: 'autonomous-cto.yml', ref: 'main', inputs: { pr_number: String(pr.number), expected_head_sha: pr.head.sha } });
              return core.info(`Approved-but-open PR #${pr.number}; merge revalidation dispatched`);
            }
            core.info(`PR #${pr.number} is waiting for a green autonomous CI status`);
