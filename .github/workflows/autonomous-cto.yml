name: AOS Autonomous CTO

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request to review
        required: true
        type: string
      expected_head_sha:
        description: Exact green SHA to review
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: write
  statuses: write
  models: read

concurrency:
  group: aos-autonomous-cto-${{ inputs.pr_number }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  review:
    if: vars.AOS_AUTONOMY_PAUSED != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Verify immutable review context
        id: context
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          EXPECTED_HEAD_SHA: ${{ inputs.expected_head_sha }}
        with:
          github-token: ${{ github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const number = Number(process.env.PR_NUMBER);
            const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: number });
            if (pr.state !== 'open') return core.setFailed(`PR #${number} is not open`);
            if (pr.head.sha !== process.env.EXPECTED_HEAD_SHA) return core.setFailed(`Head moved: ${pr.head.sha}`);
            if (!pr.head.ref.startsWith('agent/lot-')) return core.setFailed('CTO automation only reviews agent/lot-* branches');
            const statuses = await github.rest.repos.listCommitStatusesForRef({ owner, repo, ref: pr.head.sha, per_page: 100 });
            const ci = statuses.data.find((status) => status.context === 'autonomy/ci');
            if (!ci || ci.state !== 'success') return core.setFailed('autonomy/ci is not green on the expected SHA');
            core.setOutput('branch', pr.head.ref);
            core.setOutput('base_sha', pr.base.sha);
            core.setOutput('head_sha', pr.head.sha);
            core.setOutput('title', pr.title);
            core.setOutput('body', Buffer.from(pr.body || '', 'utf8').toString('base64'));

      - uses: actions/checkout@v5
        with:
          ref: ${{ steps.context.outputs.head_sha }}
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Fetch base and inspect protected paths
        id: policy
        continue-on-error: true
        env:
          BRANCH: ${{ steps.context.outputs.branch }}
          BASE_SHA: ${{ steps.context.outputs.base_sha }}
        run: |
          git fetch --no-tags origin main
          git diff --name-only "$BASE_SHA...HEAD" > .agent-files.txt
          node scripts/agents/check-protected-paths.mjs --files=.agent-files.txt --branch="$BRANCH" > .policy-result.json

      - name: Compose CTO prompt
        env:
          PR_NUMBER: ${{ inputs.pr_number }}
          TITLE: ${{ steps.context.outputs.title }}
          BODY_B64: ${{ steps.context.outputs.body }}
          BASE_SHA: ${{ steps.context.outputs.base_sha }}
          HEAD_SHA: ${{ steps.context.outputs.head_sha }}
        run: |
          mkdir -p .agent-runtime
          cp config/agents/cto-prompt.md .agent-runtime/cto-task.md
          {
            echo
            echo "# Contexte dynamique"
            echo
            echo "PR : #${PR_NUMBER}"
            echo "Titre : ${TITLE}"
            echo "Base : ${BASE_SHA}"
            echo "Head exact : ${HEAD_SHA}"
            echo
            echo "## Description de la PR"
            echo "$BODY_B64" | base64 -d
            echo
            echo "## Fichiers modifiés"
            cat .agent-files.txt
            echo
            echo "## Diff statistique"
            git diff --stat "$BASE_SHA...HEAD"
            echo
            echo "Analyse uniquement ce SHA. Inspecte les fichiers nécessaires avec les outils puis appelle finish."
          } >> .agent-runtime/cto-task.md

      - name: Produce deterministic policy rejection
        if: steps.policy.outcome == 'failure'
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const policy = JSON.parse(fs.readFileSync('.policy-result.json', 'utf8'));
          fs.writeFileSync('.agent-runtime/cto-result.json', JSON.stringify({
            decision: 'CHANGES_REQUIRED',
            summary: 'La PR modifie des fichiers de gouvernance protégés depuis une branche de lot.',
            blockingFindings: [{
              title: 'Modification interdite de la gouvernance autonome',
              risk: 'Un agent développeur pourrait modifier ses propres règles, workflows ou critères de fusion et contourner la séparation des pouvoirs.',
              scenario: `La branche de lot modifie : ${policy.violations.join(', ')}`,
              requiredFix: 'Retirer ces changements de la PR de lot. Toute évolution de gouvernance doit passer par une branche chore/autonomous-* distincte.',
              requiredTest: 'Le contrôle protected paths doit être vert avec uniquement des fichiers du lot.',
              paths: policy.violations
            }],
            recommendations: [],
            strategicIdeas: [],
            checked: {
              businessRules: false, authorization: false, tenantIsolation: false,
              transactions: false, concurrency: false, migrations: false,
              postgresIntegrity: false, tests: false, documentation: false
            }
          }, null, 2));
          NODE

      - name: Select agent provider
        if: steps.policy.outcome == 'success'
        id: provider
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -n "$OPENAI_API_KEY" ]; then echo "codex=true" >> "$GITHUB_OUTPUT"; else echo "codex=false" >> "$GITHUB_OUTPUT"; fi

      - name: Review with Codex in read-only mode
        if: steps.policy.outcome == 'success' && steps.provider.outputs.codex == 'true'
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .agent-runtime/cto-task.md
          output-file: .agent-runtime/cto-result.json
          output-schema-file: config/agents/cto-output.schema.json
          sandbox: read-only
          model: ${{ vars.AOS_CTO_MODEL }}
          effort: high

      - name: Review with GitHub Models fallback
        if: steps.policy.outcome == 'success' && steps.provider.outputs.codex != 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          AOS_AGENT_MODEL: ${{ vars.AOS_GITHUB_CTO_MODEL || vars.AOS_GITHUB_MODEL || 'openai/gpt-4.1' }}
        run: node scripts/agents/github-models-agent.mjs --role=cto --prompt-file=.agent-runtime/cto-task.md --output=.agent-runtime/cto-result.json

      - name: Render CTO decision
        env:
          SHA: ${{ steps.context.outputs.head_sha }}
        run: node scripts/agents/render-cto-comment.mjs --input=.agent-runtime/cto-result.json --output=.agent-runtime/cto-comment.md --sha="$SHA" --run="${GITHUB_RUN_ID}"

      - name: Publish CTO decision and status
        id: decision
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          SHA: ${{ steps.context.outputs.head_sha }}
        run: |
          DECISION=$(node -p "JSON.parse(require('fs').readFileSync('.agent-runtime/cto-result.json','utf8')).decision")
          gh pr comment "$PR_NUMBER" --body-file .agent-runtime/cto-comment.md
          if [ "$DECISION" = "APPROVED_FOR_MERGE" ]; then
            STATE=success
            DESCRIPTION='Independent CTO review approved this exact SHA'
          else
            STATE=failure
            DESCRIPTION='Independent CTO review requires changes'
          fi
          gh api -X POST "repos/${GITHUB_REPOSITORY}/statuses/${SHA}" -f state="$STATE" -f context='autonomy/cto' -f description="$DESCRIPTION"
          echo "value=$DECISION" >> "$GITHUB_OUTPUT"

      - name: Dispatch corrections
        if: steps.decision.outputs.value == 'CHANGES_REQUIRED'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          SHA: ${{ steps.context.outputs.head_sha }}
        run: gh workflow run autonomous-developer.yml --ref main -f mode=fix -f pr_number="$PR_NUMBER" -f expected_head_sha="$SHA"

      - name: Revalidate and merge approved SHA
        if: steps.decision.outputs.value == 'APPROVED_FOR_MERGE'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          SHA: ${{ steps.context.outputs.head_sha }}
        run: |
          CURRENT=$(gh pr view "$PR_NUMBER" --json headRefOid --jq .headRefOid)
          test "$CURRENT" = "$SHA"
          gh pr ready "$PR_NUMBER" || true
          gh api -X PUT "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/merge" -f merge_method=squash -f sha="$SHA" > .agent-runtime/merge.json
          node -e "const x=require('./.agent-runtime/merge.json'); if(!x.merged) throw new Error(x.message || 'Merge failed')"

      - name: Start next lot only after effective merge
        if: steps.decision.outputs.value == 'APPROVED_FOR_MERGE'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: gh workflow run autonomous-next-lot.yml --ref main -f previous_pr="$PR_NUMBER"
