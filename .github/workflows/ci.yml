name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pull-requests: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aos_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d aos_test"
          --health-interval 2s --health-timeout 3s --health-retries 20
    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/aos_test
      NPM_CONFIG_IGNORE_SCRIPTS: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - run: node --check scripts/agents/agent-runtime.mjs
      - run: node --check scripts/agents/orchestrator.mjs
      - run: node scripts/agents/validate-autonomy.mjs
      - name: Verify autonomous workflow registration
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p .ci-diagnostics
          gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/autonomous-delivery.yml" \
            --jq '{id,name,path,state,created_at,updated_at}' | tee .ci-diagnostics/autonomy-workflow.json
          test "$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/autonomous-delivery.yml" --jq .state)" = "active"
          gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/autonomous-delivery.yml/runs?per_page=20" \
            --jq '.workflow_runs | map({id,event,status,conclusion,head_sha,head_branch,created_at,updated_at,run_number,html_url})' \
            | tee .ci-diagnostics/autonomy-runs.json
          FAIL_ID=$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/autonomous-delivery.yml/runs?per_page=20" \
            --jq '.workflow_runs[] | select(.conclusion == "failure") | .id' | head -n 1)
          if [ -n "$FAIL_ID" ]; then
            gh run view "$FAIL_ID" --repo "$GITHUB_REPOSITORY" --log-failed > .ci-diagnostics/latest-failure-full.log 2>&1 || true
            tail -n 160 .ci-diagnostics/latest-failure-full.log > .ci-diagnostics/latest-failure.log
          else
            echo 'No failed autonomous run found.' > .ci-diagnostics/latest-failure.log
          fi
      - name: Publish autonomous workflow diagnostics
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          {
            echo '<!-- AOC-AUTONOMY-DIAGNOSTICS -->'
            echo '## Diagnostic GitHub Actions autonome'
            echo
            echo '### Workflow enregistré'
            echo '```json'
            cat .ci-diagnostics/autonomy-workflow.json
            echo '```'
            echo
            echo '### Exécutions récentes'
            echo '```json'
            cat .ci-diagnostics/autonomy-runs.json
            echo '```'
            echo
            echo '### Dernier échec — fin du journal'
            echo '```text'
            cat .ci-diagnostics/latest-failure.log
            echo '```'
          } > .ci-diagnostics/report.md
          EXISTING=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
            --jq '[.[] | select(.body | contains("AOC-AUTONOMY-DIAGNOSTICS"))] | last | .id // empty')
          if [ -n "$EXISTING" ]; then
            jq -Rs '{body: .}' .ci-diagnostics/report.md > .ci-diagnostics/comment-patch.json
            gh api --method PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${EXISTING}" --input .ci-diagnostics/comment-patch.json
          else
            gh pr comment "$PR_NUMBER" --body-file .ci-diagnostics/report.md
          fi
      - run: npx --no-install tsc --noEmit
      - run: node --test --experimental-strip-types 'packages/**/*.test.ts'
      - run: node --experimental-strip-types scripts/check-architecture.ts
