name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-json-output-hotfix:
    if: >-
      github.event_name == 'push' &&
      github.ref_name == 'chore/autonomy-json-output-hotfix-v2' &&
      github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: chore/autonomy-json-output-hotfix-v2
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Apply deterministic patch
        run: |
          node scripts/agents/apply-orchestrator-json-hotfix.cjs
          node --check scripts/agents/orchestrator.mjs
          node scripts/agents/orchestrator-io.selftest.mjs
      - name: Restore permanent CI and commit the generated hotfix
        run: |
          git fetch origin main
          git show origin/main:.github/workflows/ci.yml > /tmp/ci.yml
          node <<'NODE'
          const { readFileSync, writeFileSync } = require('node:fs');
          const path = '/tmp/ci.yml';
          let ci = readFileSync(path, 'utf8');
          const anchor = '      - run: node --check scripts/agents/orchestrator.mjs\n';
          const check = '      - run: node scripts/agents/orchestrator-io.selftest.mjs\n';
          if (!ci.includes(check)) {
            if (!ci.includes(anchor)) throw new Error('Permanent CI anchor not found');
            ci = ci.replace(anchor, anchor + check);
          }
          writeFileSync('.github/workflows/ci.yml', ci);
          NODE
          rm -f .github/workflows/_apply-autonomy-json-output-hotfix.yml
          rm -f scripts/agents/apply-orchestrator-json-hotfix.cjs
          git config user.name "AOC Governance Hotfix"
          git config user.email "aoc-governance@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix(autonomy): preserve complete GitHub JSON output"
          git push origin HEAD:chore/autonomy-json-output-hotfix-v2

  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aos_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d aos_test"
          --health-interval 2s --health-timeout 3s --health-retries 20
    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/aos_test
      NPM_CONFIG_IGNORE_SCRIPTS: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - run: node --check scripts/agents/agent-runtime.mjs
      - run: node --check scripts/agents/orchestrator.mjs
      - run: node --check scripts/agents/github-models-budget.mjs
      - run: node --check scripts/agents/reconcile-issues.mjs
      - run: node scripts/agents/github-models-budget.mjs --self-test
      - run: node scripts/agents/reconcile-issues.mjs --self-test
      - run: node scripts/agents/validate-autonomy.mjs
      - run: npx --no-install tsc --noEmit
      - run: node --test --experimental-strip-types 'packages/**/*.test.ts'
      - run: node --experimental-strip-types scripts/check-architecture.ts
