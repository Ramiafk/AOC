name: CI
on:
  push:
  pull_request:
jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aos_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d aos_test"
          --health-interval 2s --health-timeout 3s --health-retries 20
    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/aos_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run check
