name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aos_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d aos_test"
          --health-interval 2s --health-timeout 3s --health-retries 20
    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/aos_test
      NPM_CONFIG_IGNORE_SCRIPTS: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts
      - run: node --check scripts/agents/agent-runtime.mjs
      - run: node --check scripts/agents/orchestrator.mjs
      - run: node scripts/agents/validate-autonomy.mjs
      - name: Verify autonomous workflow registration
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/autonomous-delivery.yml" \
            --jq '{id,name,path,state,created_at,updated_at}' | tee /tmp/autonomy-workflow.json
          test "$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/autonomous-delivery.yml" --jq .state)" = "active"
          echo "Recent autonomous runs:"
          gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/autonomous-delivery.yml/runs?per_page=10" \
            --jq '.workflow_runs[] | [.id,.event,.status,.conclusion,.head_sha,.created_at] | @tsv' || true
      - run: npx --no-install tsc --noEmit
      - run: node --test --experimental-strip-types 'packages/**/*.test.ts'
      - run: node --experimental-strip-types scripts/check-architecture.ts
