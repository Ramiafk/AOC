name: Apply autonomy rate-limit resilience

on:
  push:
    branches: [chore/autonomy-rate-limit-resilience]

permissions:
  contents: write

concurrency:
  group: apply-autonomy-rate-limit-resilience
  cancel-in-progress: true

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: chore/autonomy-rate-limit-resilience
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Apply deterministic patch
        run: |
          node scripts/agents/apply-rate-limit-resilience.cjs
          node --check scripts/agents/agent-runtime.mjs
          node --check scripts/agents/orchestrator.mjs
          node scripts/agents/model-resilience.selftest.mjs
      - name: Restore permanent CI and commit
        run: |
          node <<'NODE'
          const { readFileSync, writeFileSync } = require('node:fs');
          const path = '.github/workflows/ci.yml';
          let ci = readFileSync(path, 'utf8');
          const anchor = '      - run: node scripts/agents/orchestrator-io.selftest.mjs\n';
          const check = '      - run: node scripts/agents/model-resilience.selftest.mjs\n';
          if (!ci.includes(check)) {
            if (!ci.includes(anchor)) throw new Error('CI anchor not found');
            ci = ci.replace(anchor, anchor + check);
          }
          writeFileSync(path, ci);
          NODE
          rm -f scripts/agents/apply-rate-limit-resilience.cjs
          rm -f .github/workflows/_apply-rate-limit-resilience.yml
          git config user.name "AOC Governance Resilience"
          git config user.email "aoc-governance@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "fix(autonomy): tolerate GitHub Models rate limits"
          git push origin HEAD:chore/autonomy-rate-limit-resilience
