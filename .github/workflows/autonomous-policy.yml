name: AOS Autonomous Policy Guard

on:
  pull_request_target:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce one lot and protected governance paths
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pr = context.payload.pull_request;
            if (!pr.head.ref.startsWith('agent/lot-')) return core.info('Not an autonomous lot branch');
            if (pr.head.repo.full_name !== `${owner}/${repo}`) return core.setFailed('Autonomous lot PRs cannot originate from a fork');

            const policyFile = await github.rest.repos.getContent({
              owner, repo,
              path: 'config/agents/protected-paths.json',
              ref: pr.base.sha
            });
            if (Array.isArray(policyFile.data) || policyFile.data.type !== 'file') return core.setFailed('Protected-path policy is unavailable');
            const policy = JSON.parse(Buffer.from(policyFile.data.content, policyFile.data.encoding).toString('utf8'));

            const files = await github.paginate(github.rest.pulls.listFiles, { owner, repo, pull_number: pr.number, per_page: 100 });
            const violations = files.map((file) => file.filename).filter((file) =>
              policy.exact.includes(file) || policy.prefixes.some((prefix) => file.startsWith(prefix))
            );
            if (violations.length) core.setFailed(`Autonomous lot modified protected governance paths: ${violations.join(', ')}`);

            const { data: pulls } = await github.rest.pulls.list({ owner, repo, state: 'open', per_page: 100 });
            const active = pulls.filter((value) => value.head.ref.startsWith('agent/lot-'));
            if (active.length > 1) core.setFailed(`More than one lot PR is active: ${active.map((value) => `#${value.number}`).join(', ')}`);
