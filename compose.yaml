services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: aos
      POSTGRES_USER: aos
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aos -d aos"]
      interval: 2s
      timeout: 3s
      retries: 20
    volumes:
      - aos_postgres:/var/lib/postgresql/data

volumes:
  aos_postgres:
